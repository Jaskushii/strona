        <svg id="icon-muted" viewBox="0 0 24 24">
            <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>

<script>
    // --- PARALAKSA I NOWY KURSOR ---
    const tiltCard = document.getElementById('tilt-card');
    const circleElement = document.querySelector('.circle');
    
    let mouseX = 0, mouseY = 0;
    let circleX = 0, circleY = 0;
    let targetScale = 1;
    let currentScale = 1;
    let firstMove = true;

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        if (firstMove) {
            circleX = mouseX;
            circleY = mouseY;
            firstMove = false;
        }
        
        if (window.innerWidth > 768) {
            circleElement.style.opacity = 1;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const moveX = (mouseX - centerX) / centerX;
            const moveY = (mouseY - centerY) / centerY;
            tiltCard.style.transform = `rotateY(${moveX * 12}deg) rotateX(${moveY * -12}deg)`;
        }
    });

    const tick = () => {
        if (window.innerWidth > 768 && !firstMove) {
            circleX += (mouseX - circleX) * 0.4;
            circleY += (mouseY - circleY) * 0.4;
            currentScale += (targetScale - currentScale) * 0.2; // Płynne powiększanie
            
            circleElement.style.transform = `translate(${circleX}px, ${circleY}px) scale(${currentScale})`;
        }
        requestAnimationFrame(tick);
    };
    tick();

    // Dodanie logiki Hover dla wszystkich linków, przycisków i suwaków
    const interactables = document.querySelectorAll('a, button, input');
    interactables.forEach(el => {
        el.addEventListener('mouseenter', () => {
            circleElement.classList.add('hovered');
            targetScale = 1.4; // Powiększa się o 40% na hoverze
        });
        el.addEventListener('mouseleave', () => {
            circleElement.classList.remove('hovered');
            targetScale = 1; // Wraca do standardowej wielkości
        });
    });


    // --- ODTWARZACZ WIDEO I GŁOŚNOŚĆ ---
    const video = document.getElementById('bgVideo');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const iconMuted = document.getElementById('icon-muted');
    const iconUnmuted = document.getElementById('icon-unmuted');
    const audioControl = document.getElementById('audioControl');

    // Startowa głośność 20%
    const defaultVol = 0.2;
    volumeSlider.value = defaultVol;
    volumeSlider.style.background = `linear-gradient(to right, white ${defaultVol * 100}%, rgba(255,255,255,0.2) ${defaultVol * 100}%)`;

    muteBtn.addEventListener('click', () => {
        if (video.muted) {
            video.muted = false;
            
            // Jeśli ktoś wyciszył do zera suwakiem i znowu wciśnie unmute, ustaw na 20%
            if (parseFloat(volumeSlider.value) === 0) {
                volumeSlider.value = defaultVol;
                volumeSlider.style.background = `linear-gradient(to right, white ${defaultVol * 100}%, rgba(255,255,255,0.2) ${defaultVol * 100}%)`;
            }
            video.volume = volumeSlider.value;
            
            iconMuted.style.display = 'none';
            iconUnmuted.style.display = 'block';
            audioControl.classList.add('is-unmuted');
        } else {
            video.muted = true;
            iconMuted.style.display = 'block';
            iconUnmuted.style.display = 'none';
            audioControl.classList.remove('is-unmuted');
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        video.volume = val;
        
        e.target.style.background = `linear-gradient(to right, white ${val * 100}%, rgba(255,255,255,0.2) ${val * 100}%)`;

        if (val === 0) {
            video.muted = true;
            audioControl.classList.remove('is-unmuted');
            iconMuted.style.display = 'block';
            iconUnmuted.style.display = 'none';
        } else {
            video.muted = false;
            audioControl.classList.add('is-unmuted');
            iconMuted.style.display = 'none';
            iconUnmuted.style.display = 'block';
        }
    });
</script>

</body>
